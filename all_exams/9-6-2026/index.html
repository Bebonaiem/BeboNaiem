<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>اختبار تطبيقات العروض التعليمية | 80 سؤال تفاعلي مع نتائج فورية</title>
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="اختبار تطبيقات العروض التعليمية | 80 سؤال تفاعلي مع نتائج فورية">
    <meta property="og:description" content="اختبار شامل في تطبيقات العروض التعليمية يحتوي على 80 سؤال (60 صح وخطأ + 20 اختيار من متعدد) مع نتائج فورية وحفظ المحاولات">
    <meta property="og:image" content="https://bebonaiem.dpdns.org/all_exams/9-6-2026/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="اختبار تطبيقات العروض التعليمية">
    <meta property="og:url" content="https://bebonaiem.dpdns.org/all_exams/9-6-2026/">
    <meta property="og:site_name" content="اختبار تطبيقات العروض التعليمية">
    
    <!-- General -->
    <meta name="description" content="اختبار شامل في تطبيقات العروض التعليمية يحتوي على 80 سؤال (60 صح وخطأ + 20 اختيار من متعدد) مع نتائج فورية وحفظ المحاولات">
    <meta name="theme-color" content="#0f0f1a">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='10' y='20' width='80' height='55' rx='5' fill='%236366f1'/%3E%3Crect x='15' y='25' width='70' height='45' rx='3' fill='%230f0f1a'/%3E%3Crect x='35' y='75' width='30' height='5' rx='2' fill='%236366f1'/%3E%3Crect x='25' y='80' width='50' height='3' rx='1.5' fill='%236366f1'/%3E%3Ccircle cx='50' cy='47' r='12' fill='none' stroke='%23a78bfa' stroke-width='2'/%3E%3Cpath d='M44 47 L48 51 L56 43' stroke='%23a78bfa' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
</head>
<body>

<!-- الصفحة الرئيسية -->
<div id="home-page" class="page active">
    <div class="container">
        <div class="home-card">
            <div class="icon-svg">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
                    <rect x="10" y="20" width="80" height="55" rx="5" fill="#6366f1"/>
                    <rect x="15" y="25" width="70" height="45" rx="3" fill="#0f0f1a"/>
                    <rect x="35" y="75" width="30" height="5" rx="2" fill="#6366f1"/>
                    <rect x="25" y="80" width="50" height="3" rx="1.5" fill="#6366f1"/>
                    <circle cx="50" cy="47" r="12" fill="none" stroke="#a78bfa" stroke-width="2"/>
                    <path d="M44 47 L48 51 L56 43" stroke="#a78bfa" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1>اختبار تطبيقات العروض التعليمية</h1>
            <p class="subtitle">اختبار شامل ومتكامل</p>
            <p class="info">80 سؤال ● 60 صح/خطأ ● 20 اختيار من متعدد</p>
            
            <div class="question-count-wrapper">
                <label for="question-count">عدد الأسئلة</label>
                <select id="question-count" class="question-count-select">
                    <option value="80" selected>الكل (80)</option>
                    <option value="60">60 سؤال</option>
                    <option value="40">40 سؤال</option>
                    <option value="20">20 سؤال</option>
                </select>
            </div>
            
            <div class="buttons">
                <button id="btn-start" class="btn btn-primary">ابدأ الاختبار</button>
                <button id="btn-random" class="btn btn-secondary">🎲 ترتيب عشوائي</button>
                <button id="btn-attempts" class="btn btn-outline">📋 جميع المحاولات</button>
            </div>
        </div>
    </div>
</div>

<!-- صفحة الاختبار -->
<div id="quiz-page" class="page">
    <div class="container">
        <div class="quiz-header">
            <div class="quiz-info">
                <span id="question-counter">السؤال 1 من 80</span>
                <span id="attempt-label">المحاولة 1</span>
            </div>
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
        </div>

        <div id="question-card" class="question-card">
            <h2 id="question-text"></h2>
            <div id="options-container" class="options-container"></div>
        </div>

        <div class="quiz-nav">
            <button id="btn-prev" class="btn btn-nav" disabled>→ السابق</button>
            <button id="btn-end" class="btn btn-danger">إنهاء الاختبار</button>
            <button id="btn-next" class="btn btn-nav">التالي ←</button>
        </div>
    </div>
</div>

<!-- صفحة النتائج -->
<div id="result-page" class="page">
    <div class="container">
        <div class="result-header">
            <h1>📊 نتائج الاختبار</h1>
            <div class="result-actions result-actions-top">
                <div class="share-buttons">
                    <button id="btn-share-whatsapp" class="btn btn-share btn-whatsapp">واتساب</button>
                </div>
                <button id="btn-back-home" class="btn btn-primary">العودة للرئيسية</button>
            </div>
            <div id="result-summary" class="result-summary"></div>
        </div>
        <div id="result-details" class="result-details"></div>
        <div class="result-actions result-actions-bottom">
            <div class="share-buttons">
                <button id="btn-share-whatsapp2" class="btn btn-share btn-whatsapp">واتساب</button>
            </div>
            <button id="btn-back-home4" class="btn btn-primary">العودة للرئيسية</button>
        </div>
    </div>
</div>

<!-- صفحة جميع المحاولات -->
<div id="attempts-page" class="page">
    <div class="container">
        <div class="result-header">
            <h1>📋 جميع المحاولات</h1>
        </div>
        <div id="attempts-list" class="attempts-list"></div>
        <div class="result-actions">
            <button id="btn-back-home2" class="btn btn-primary">العودة للرئيسية</button>
        </div>
    </div>
</div>

<!-- صفحة عرض محاولة محددة -->
<div id="attempt-detail-page" class="page">
    <div class="container">
        <div class="result-header">
            <h1 id="attempt-detail-title">تفاصيل المحاولة</h1>
            <div class="result-actions result-actions-top">
                <button id="btn-back-attempts2" class="btn btn-primary">العودة للمحاولات</button>
                <button id="btn-back-home5" class="btn btn-outline">العودة للرئيسية</button>
            </div>
            <div id="attempt-detail-summary" class="result-summary"></div>
        </div>
        <div id="attempt-detail-details" class="result-details"></div>
        <div class="result-actions result-actions-bottom">
            <button id="btn-back-attempts" class="btn btn-primary">العودة للمحاولات</button>
            <button id="btn-back-home3" class="btn btn-outline">العودة للرئيسية</button>
        </div>
    </div>
</div>

<footer>
    <p>مادة تطبيقات العروض التعليمية</p>
</footer>

<!-- مودال التأكيد -->
<div id="confirm-modal" class="modal-overlay">
    <div class="modal-box">
        <p id="confirm-message" class="modal-message"></p>
        <div class="modal-buttons">
            <button id="confirm-ok" class="btn btn-danger btn-modal">إنهاء</button>
            <button id="confirm-cancel" class="btn btn-secondary btn-modal">متابعة</button>
        </div>
    </div>
</div>

<script src="questions.js"></script>
<script src="app.js"></script>
</body>
</html>
