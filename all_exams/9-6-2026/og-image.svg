<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Card -->
  <rect x="60" y="60" width="1080" height="510" rx="24" fill="#16213e" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  
  <!-- Top accent line -->
  <rect x="60" y="60" width="1080" height="4" rx="2" fill="url(#accent)"/>
  
  <!-- Presentation Icon -->
  <g transform="translate(520, 100) scale(1.8)">
    <rect x="10" y="20" width="80" height="55" rx="5" fill="#6366f1"/>
    <rect x="15" y="25" width="70" height="45" rx="3" fill="#0f0f1a"/>
    <rect x="35" y="75" width="30" height="5" rx="2" fill="#6366f1"/>
    <rect x="25" y="80" width="50" height="3" rx="1.5" fill="#6366f1"/>
    <circle cx="50" cy="47" r="12" fill="none" stroke="#a78bfa" stroke-width="2"/>
    <path d="M44 47 L48 51 L56 43" stroke="#a78bfa" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Checkmark -->
  <circle cx="600" cy="320" r="28" fill="#10b981"/>
  <path d="M588 320 L596 328 L612 312" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Title -->
  <text x="600" y="400" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="48" font-weight="bold">اختبار تطبيقات العروض التعليمية</text>
  
  <!-- Subtitle -->
  <text x="600" y="460" text-anchor="middle" fill="#a78bfa" font-family="Arial, sans-serif" font-size="32">اختبار شامل ومتكامل</text>
  
  <!-- Info badges -->
  <rect x="300" y="490" width="160" height="40" rx="20" fill="rgba(99,102,241,0.2)"/>
  <text x="380" y="516" text-anchor="middle" fill="#a78bfa" font-family="Arial, sans-serif" font-size="20">60 صح/خطأ</text>
  
  <rect x="520" y="490" width="160" height="40" rx="20" fill="rgba(16,185,129,0.2)"/>
  <text x="600" y="516" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="20">20 اختيار</text>
  
  <rect x="740" y="490" width="160" height="40" rx="20" fill="rgba(245,158,11,0.2)"/>
  <text x="820" y="516" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="20">80 سؤال</text>
</svg>
